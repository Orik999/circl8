# Project Circl8
# Stack: 02 Cloudflare DDNS
# Purpose: Keep the base domain A record updated through Cloudflare
# Managed by: Script 6.1
# Requires: .env generated by Script 6
# Secrets: Cloudflare token file
# Networks: default outbound-only Docker network
# Notes: Do not commit real secrets or generated runtime files

name: cf-ddns

secrets:
  cf_api_token:
    file: ${CF_API_TOKEN_FILE}

services:
  cf-ddns:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${CF_DDNS_IMAGE:-oznu/cloudflare-ddns:latest}
    container_name: cf-ddns
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    secrets:
      - cf_api_token

    environment:
      API_KEY_FILE: /run/secrets/cf_api_token
      ZONE: ${DOMAIN}
      PROXIED: "true"
      RRTYPE: A
      DELETE_ON_STOP: "false"
      DNS_SERVER: 1.1.1.1
