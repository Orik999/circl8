name: postiz

services:
  postiz:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${POSTIZ_IMAGE:-ghcr.io/gitroomhq/postiz-app:latest}
    container_name: postiz
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - t2_proxy
      - database

    environment:
      TZ: ${TZ}

      MAIN_URL: https://${POSTIZ_HOST}
      FRONTEND_URL: https://${POSTIZ_HOST}
      NEXT_PUBLIC_BACKEND_URL: https://${POSTIZ_HOST}/api
      BACKEND_URL: https://${POSTIZ_HOST}/api
      BACKEND_INTERNAL_URL: http://127.0.0.1:3000

      DATABASE_URL: postgresql://postiz:${POSTIZ_POSTGRES_PASSWORD}@postgres:5432/postiz
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      JWT_SECRET: ${POSTIZ_JWT_SECRET}

      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default

      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads

      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      RUN_CRON: "true"

    volumes:
      - ${DOCKER_DIR}/appdata/postiz/uploads:/uploads

    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -qi :0BB8"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s

    labels:
      traefik.enable: "true"

      traefik.http.routers.postiz.rule: Host(`${POSTIZ_HOST}`)
      traefik.http.routers.postiz.entrypoints: https
      traefik.http.routers.postiz.tls: "true"
      traefik.http.routers.postiz.middlewares: chain-large-upload@file
      traefik.http.routers.postiz.service: postiz

      traefik.http.services.postiz.loadbalancer.server.port: 5000

networks:
  t2_proxy:
    name: t2_proxy
    external: true

  database:
    name: database
    external: true
