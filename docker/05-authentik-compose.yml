# 05-authentik-compose.yml
# Project: Authentik
# Purpose: SSO and domain-level forward-auth provider for protected apps behind Traefik.
#
# Public-GitHub-safe:
# - No real secrets are stored in this file.
# - All sensitive values are read from the local .env generated by Script 6.
# - Script 6 must pre-create appdata/authentik folders and fix ownership/permissions.
#
# Important final setup notes:
# - Do NOT create a second custom Traefik outpost.
# - Use the existing healthy "authentik Embedded Outpost".
# - Script 6.5 should create/update the Traefik Forward Auth provider/application,
#   set domain-level forward-auth, set Cookie domain=${DOMAIN}, attach it to the
#   existing embedded outpost, then verify:
#   /outpost.goauthentik.io/start returns HTTP 302.
# - Forward-auth middleware is defined in Traefik dynamic-config.yml as a file-provider middleware.
#   This compose deliberately does not define Docker-label forward-auth middleware.

name: authentik

services:
  authentik-server:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server:latest}
    container_name: authentik-server
    restart: unless-stopped
    command: server

    security_opt:
      - no-new-privileges:true

    networks:
      - t2_proxy
      - database

    volumes:
      - ${DOCKER_DIR}/appdata/authentik/media:/media
      - ${DOCKER_DIR}/appdata/authentik/custom-templates:/templates
      - ${DOCKER_DIR}/appdata/authentik/certs:/certs

    environment:
      TZ: ${TZ}

      # Core application secrets.
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}

      # External URL values generated by Script 6.
      AUTHENTIK_HOST: ${AUTHENTIK_HOST}
      AUTHENTIK_HOST_BROWSER: ${AUTHENTIK_HOST_BROWSER}

      # Bootstrap admin values collected by Script 6.
      # These allow first login without relying only on the initial setup URL.
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}

      # Redis backend.
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}

      # PostgreSQL backend.
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}

      # Authentik runtime safety and optional SMTP values generated by Script 6.
      # Email delivery is optional; update checks are disabled by default until SMTP is configured.
      AUTHENTIK_DISABLE_UPDATE_CHECK: ${AUTHENTIK_DISABLE_UPDATE_CHECK:-true}
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: ${AUTHENTIK_DISABLE_STARTUP_ANALYTICS:-true}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST:-}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT:-587}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS:-true}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL:-false}
      AUTHENTIK_EMAIL__TIMEOUT: ${AUTHENTIK_EMAIL__TIMEOUT:-30}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM:-authentik@${DOMAIN}}

    labels:
      traefik.enable: "true"

      traefik.http.routers.authentik.rule: Host(`${AUTHENTIK_ROUTE_HOST}`)
      traefik.http.routers.authentik.entrypoints: https
      traefik.http.routers.authentik.tls: "true"
      traefik.http.routers.authentik.middlewares: chain-secure@file
      traefik.http.routers.authentik.service: authentik

      traefik.http.services.authentik.loadbalancer.server.port: 9000

  authentik-worker:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server:latest}
    container_name: authentik-worker
    restart: unless-stopped
    command: worker

    security_opt:
      - no-new-privileges:true

    networks:
      - database

    volumes:
      - ${DOCKER_DIR}/appdata/authentik/media:/media
      - ${DOCKER_DIR}/appdata/authentik/custom-templates:/templates
      - ${DOCKER_DIR}/appdata/authentik/certs:/certs

    environment:
      TZ: ${TZ}

      # Core application secrets.
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}

      # External URL values generated by Script 6.
      AUTHENTIK_HOST: ${AUTHENTIK_HOST}
      AUTHENTIK_HOST_BROWSER: ${AUTHENTIK_HOST_BROWSER}

      # Bootstrap admin values collected by Script 6.
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}

      # Redis backend.
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}

      # PostgreSQL backend.
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}

      # Authentik runtime safety and optional SMTP values generated by Script 6.
      AUTHENTIK_DISABLE_UPDATE_CHECK: ${AUTHENTIK_DISABLE_UPDATE_CHECK:-true}
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: ${AUTHENTIK_DISABLE_STARTUP_ANALYTICS:-true}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST:-}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT:-587}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS:-true}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL:-false}
      AUTHENTIK_EMAIL__TIMEOUT: ${AUTHENTIK_EMAIL__TIMEOUT:-30}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM:-authentik@${DOMAIN}}

networks:
  t2_proxy:
    name: t2_proxy
    external: true

  database:
    name: database
    external: true
