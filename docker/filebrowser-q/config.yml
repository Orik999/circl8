# FileBrowser Quantum runtime config template.
# GitHub-safe: values below are substituted by Script 8 at deploy time.
# Do not commit rendered runtime config.yaml from appdata; it contains real OIDC secrets.

server:
  port: 80
  sources:
    - path: "/srv/files"
      name: "Files"
      config:
        defaultEnabled: true
    - path: "/srv/compose"
      name: "Compose"
      config:
        defaultEnabled: true
    - path: "/srv/shared"
      name: "Shared"
      config:
        defaultEnabled: true
    - path: "/srv/backups"
      name: "Backups"
      config:
        defaultEnabled: true
    - path: "/srv/traefik-config"
      name: "Traefik Config"
      config:
        defaultEnabled: true
  database: "/home/filebrowser/data/database.db"
  cacheDir: "/home/filebrowser/data/cache"

auth:
  methods:
    password:
      enabled: false
    oidc:
      enabled: true
      issuerUrl: "${FILEBROWSER_OIDC_ISSUER_URL}"
      clientId: "${FILEBROWSER_OIDC_CLIENT_ID}"
      clientSecret: "${FILEBROWSER_OIDC_CLIENT_SECRET}"
      scopes: "openid email profile groups"
      userIdentifier: "preferred_username"
