# Project Circl8
# Stack: 03 Cloudflare Companion
# Purpose: Create and update Cloudflare DNS records from Traefik Docker labels
# Managed by: Script 6.1
# Requires: .env generated by Script 6; socket-proxy from Script 6.1
# Secrets: Cloudflare token file
# Networks: socket_proxy
# Notes: Do not commit real secrets or generated runtime files

name: cf-companion

secrets:
  cf_token:
    file: ${CF_API_TOKEN_FILE}

services:
  cf-companion:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${CF_COMPANION_IMAGE:-tiredofit/traefik-cloudflare-companion:latest}
    container_name: cf-companion
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - socket_proxy

    secrets:
      - cf_token

    environment:
      TIMEZONE: ${TZ}
      DOCKER_HOST: tcp://socket-proxy:2375
      TRAEFIK_VERSION: 2
      ENABLE_TRAEFIK_POLL: "FALSE"
      TARGET_DOMAIN: ${DOMAIN}
      DOMAIN1: ${DOMAIN}
      DOMAIN1_ZONE_ID: ${CF_ZONE_ID}
      DOMAIN1_PROXIED: "true"
      DEFAULT_TTL: 1

networks:
  socket_proxy:
    name: socket_proxy
    external: true
