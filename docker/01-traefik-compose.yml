# Project Circl8
# Stack: 01 Traefik
# Purpose: Reverse proxy, TLS termination, and routing entrypoint
# Managed by: Script 6.1
# Requires: .env generated by Script 6; Traefik config rendered by Script 6
# Secrets: Cloudflare token file, htpasswd, acme.json
# Networks: t2_proxy, socket_proxy
# Notes: Do not commit real secrets or generated runtime files

name: traefik

secrets:
  cf_api_token:
    file: ${CF_API_TOKEN_FILE}
  htpasswd:
    file: ${DOCKER_SECRETS_DIR}/htpasswd

services:
  traefik:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${TRAEFIK_IMAGE:-traefik:latest}
    container_name: traefik
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - t2_proxy
      - socket_proxy

    ports:
      - "80:80"
      - "443:443"

    secrets:
      - cf_api_token
      - htpasswd

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_DIR}/appdata/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${DOCKER_DIR}/appdata/traefik/dynamic-config.yml:/etc/traefik/dynamic-config.yml:ro
      - ${DOCKER_DIR}/appdata/traefik/acme:/acme

    environment:
      TZ: ${TZ}
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_api_token

    labels:
      traefik.enable: "true"
      traefik.docker.network: "t2_proxy"
      traefik.http.routers.traefik.rule: "Host(`${TRAEFIK_HOST}`)"
      traefik.http.routers.traefik.entrypoints: "https"
      traefik.http.routers.traefik.tls: "true"
      traefik.http.routers.traefik.middlewares: "chain-local-only@file"
      traefik.http.routers.traefik.service: "api@internal"

networks:
  t2_proxy:
    name: t2_proxy
    external: true
  socket_proxy:
    name: socket_proxy
    external: true
