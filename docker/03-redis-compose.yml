# 03-redis-compose.yml
# Project: Redis
# Purpose: Shared internal Redis service for Authentik/Postiz/backend queues.

name: redis

services:
  redis:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${REDIS_IMAGE:-redis:latest}
    container_name: redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    networks:
      - database
    volumes:
      - ${DOCKER_DIR}/appdata/redis:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ}
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  database:
    name: database
    external: true
