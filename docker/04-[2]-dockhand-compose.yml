# 04-[2]-dockhand-compose.yml
# Project: Dockhand
# Purpose: Modern Docker management platform with multi-host/Hawser support.
#
# Public-GitHub-safe:
# - No real secrets are stored in this file.
# - Runtime values come from ${DOCKER_DIR}/.env generated by Script 6.
# - Protected externally by Traefik + Authentik.
# - No direct host port is published in this base compose.
# - Docker API access is routed through socket-proxy instead of a raw Docker socket bind mount.
#
# Notes:
# - Dockhand listens on container port 3000.
# - Temporary direct access is added only by 04-[2]-dockhand-bootstrap-override.yml.
# - If Dockhand later proves incompatible with DOCKER_HOST/socket-proxy, use its agent/Hawser model rather than a raw socket bind mount.

name: dockhand

services:
  dockhand:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${DOCKHAND_IMAGE:-fnsys/dockhand:latest}
    container_name: dockhand
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - t2_proxy
      - socket_proxy

    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      DATA_DIR: ${DOCKER_DIR}/appdata/dockhand
      DOCKER_HOST: tcp://socket-proxy:2375

    volumes:
      - ${DOCKER_DIR}/appdata/dockhand:${DOCKER_DIR}/appdata/dockhand
      - ${DOCKER_DIR}/compose:${DOCKER_DIR}/compose
      - ${DOCKER_DIR}/.env:${DOCKER_DIR}/.env:ro
    labels:
      traefik.enable: "true"

      traefik.http.routers.dockhand.rule: Host(`${ADMIN_UI_HOST}`)
      traefik.http.routers.dockhand.entrypoints: https
      traefik.http.routers.dockhand.tls: "true"
      traefik.http.routers.dockhand.middlewares: chain-authentik@file
      traefik.http.routers.dockhand.service: dockhand

      traefik.http.services.dockhand.loadbalancer.server.port: 3000

networks:
  t2_proxy:
    name: t2_proxy
    external: true

  socket_proxy:
    name: socket_proxy
    external: true
