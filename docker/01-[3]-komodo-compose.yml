# 01-[3]-komodo-compose.yml
# Project: Komodo
# Purpose: Advanced Docker/compose deployment platform.
#
# Public-GitHub-safe:
# - No real secrets are stored in this file.
# - Secrets must come from local .env generated by Script 6.
# - Protected externally by Traefik + Authentik.
# - No direct host port is published in this base compose.
# - Docker API access is routed through socket-proxy instead of a raw Docker socket bind mount.
#
# Required .env values:
# KOMODO_DB_PASSWORD=
# KOMODO_PASSKEY=
# KOMODO_JWT_SECRET=
# KOMODO_WEBHOOK_SECRET=

name: komodo

services:
  komodo-postgres:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${KOMODO_POSTGRES_IMAGE:-postgres:latest}
    container_name: komodo-postgres
    restart: unless-stopped

    networks:
      - komodo_internal

    environment:
      TZ: ${TZ}
      POSTGRES_DB: komodo
      POSTGRES_USER: komodo
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}

    volumes:
      - ${DOCKER_DIR}/appdata/komodo/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komodo -d komodo"]
      interval: 10s
      timeout: 5s
      retries: 10

  ferretdb:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${KOMODO_FERRETDB_IMAGE:-ghcr.io/ferretdb/ferretdb:latest}
    container_name: komodo-ferretdb
    restart: unless-stopped

    networks:
      - komodo_internal

    environment:
      TZ: ${TZ}
      FERRETDB_POSTGRESQL_URL: postgres://komodo:${KOMODO_DB_PASSWORD}@komodo-postgres:5432/komodo

    depends_on:
      komodo-postgres:
        condition: service_healthy

  komodo-core:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${KOMODO_CORE_IMAGE:-ghcr.io/moghtech/komodo-core:latest}
    container_name: komodo-core
    restart: unless-stopped

    networks:
      - t2_proxy
      - komodo_internal

    environment:
      TZ: ${TZ}

      # Public URL.
      KOMODO_HOST: ${ADMIN_UI_URL}

      # Database via FerretDB.
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_DB_NAME: komodo

      # Local secrets from .env.
      KOMODO_PASSKEY: ${KOMODO_PASSKEY}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET}
      KOMODO_WEBHOOK_SECRET: ${KOMODO_WEBHOOK_SECRET}

    volumes:
      - ${DOCKER_DIR}/appdata/komodo/core:/config
      - ${DOCKER_DIR}/.env:${DOCKER_DIR}/.env:ro
    depends_on:
      - ferretdb

    labels:
      traefik.enable: "true"

      traefik.http.routers.komodo.rule: Host(`${ADMIN_UI_HOST}`)
      traefik.http.routers.komodo.entrypoints: https
      traefik.http.routers.komodo.tls: "true"
      traefik.http.routers.komodo.middlewares: chain-authentik@file
      traefik.http.routers.komodo.service: komodo

      traefik.http.services.komodo.loadbalancer.server.port: 9120

  komodo-periphery:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${KOMODO_PERIPHERY_IMAGE:-ghcr.io/moghtech/komodo-periphery:latest}
    container_name: komodo-periphery
    restart: unless-stopped

    networks:
      - komodo_internal
      - socket_proxy

    environment:
      TZ: ${TZ}
      PERIPHERY_PASSKEYS: ${KOMODO_PASSKEY}
      DOCKER_HOST: tcp://socket-proxy:2375

    volumes:
      - ${DOCKER_DIR}/compose:/stacks
      - ${DOCKER_DIR}/appdata/komodo/periphery:/config

networks:
  t2_proxy:
    name: t2_proxy
    external: true

  socket_proxy:
    name: socket_proxy
    external: true

  komodo_internal:
    name: komodo_internal
    driver: bridge
