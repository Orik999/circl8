# 12-filebrowser-compose.yml
# Project: Filebrowser
# Purpose: Lightweight browser file manager for uploads/downloads and safe project-file edits.
#
# Final setup notes:
# - Filebrowser original is very lightweight, but it does not provide clean native OIDC/SSO.
# - It is protected by Traefik + Authentik forward-auth instead.
# - For future proper low-resource OIDC/SSO, SFTPGo is the recommended replacement candidate.
#
# Security notes:
# - compose/shared/backups are mounted read-write so you can upload modified YAML/files.
# - secrets, .env, PostgreSQL data, Redis data, Authentik data, and acme.json are intentionally not mounted.
# - Traefik appdata is NOT mounted as a whole because it can contain certificate/private ACME material.
# - Only selected Traefik config files are mounted for safe editing.
# - No direct host port is published.
#
# Upload/download notes:
# - Uses chain-authentik-large-upload@file from Traefik dynamic-config.yml.
# - Large upload/download buffering is managed centrally in Traefik's file-provider middleware.
# - No Filebrowser-specific Docker middleware is created here to avoid drift from the central Traefik template.

name: filebrowser

services:
  filebrowser:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${FILEBROWSER_IMAGE:-filebrowser/filebrowser:latest}
    container_name: filebrowser
    restart: unless-stopped

    user: "${PUID}:${PGID}"

    security_opt:
      - no-new-privileges:true

    networks:
      - t2_proxy

    volumes:
      # General safe project work areas.
      - ${DOCKER_DIR}/compose:/srv/compose
      - ${DOCKER_DIR}/shared:/srv/shared
      - ${DOCKER_DIR}/backups:/srv/backups

      # Selected editable Traefik files only.
      # Do NOT mount the full ${DOCKER_DIR}/appdata/traefik directory because it may expose acme.json.
      - ${DOCKER_DIR}/appdata/traefik/traefik.yml:/srv/traefik-config/traefik.yml
      - ${DOCKER_DIR}/appdata/traefik/dynamic-config.yml:/srv/traefik-config/dynamic-config.yml

      # Filebrowser persistence.
      - ${DOCKER_DIR}/appdata/filebrowser/database:/database
      - ${DOCKER_DIR}/appdata/filebrowser/config:/config

    environment:
      TZ: ${TZ}

    labels:
      traefik.enable: "true"

      # Router.
      traefik.http.routers.filebrowser.rule: Host(`${FILEBROWSER_HOST}`)
      traefik.http.routers.filebrowser.entrypoints: https
      traefik.http.routers.filebrowser.tls: "true"
      traefik.http.routers.filebrowser.middlewares: chain-authentik-large-upload@file
      traefik.http.routers.filebrowser.service: filebrowser

      # Service.
      traefik.http.services.filebrowser.loadbalancer.server.port: 80

networks:
  t2_proxy:
    name: t2_proxy
    external: true
