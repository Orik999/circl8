# Project Circl8
# Stack: 00 Socket Proxy
# Purpose: Safely expose selected Docker API endpoints to internal platform containers
# Managed by: Script 6.1
# Requires: .env generated by Script 6
# Secrets: none
# Networks: socket_proxy
# Notes: Do not commit real secrets or generated runtime files

name: socket-proxy

services:
  socket-proxy:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:latest}
    container_name: socket-proxy
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /run
      - /tmp

    networks:
      - socket_proxy

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      LOG_LEVEL: info

      EVENTS: 1
      PING: 1
      VERSION: 1
      INFO: 1
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      SERVICES: 1
      TASKS: 1
      POST: 1

      AUTH: 0
      SECRETS: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      NODES: 0
      PLUGINS: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:2375/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  socket_proxy:
    name: socket_proxy
    external: true
