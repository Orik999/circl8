# 10-vscode-compose.yml
# Project: VS Code Server
# Purpose: Browser-based code/config editing for compose/shared files.
# Security note: secrets and full appdata are intentionally not mounted.

name: vscode

services:
  vscode:
    env_file:
      - ${DOCKER_DIR}/.env
    image: ${VSCODE_IMAGE:-lscr.io/linuxserver/code-server:latest}
    container_name: vscode
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - t2_proxy
    volumes:
      - ${DOCKER_DIR}/compose:/data/docker/compose
      - ${DOCKER_DIR}/shared:/data/docker/shared
      - ${DOCKER_DIR}/backups:/data/docker/backups
      - ${DOCKER_DIR}/appdata:/config
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      DEFAULT_WORKSPACE: /data/docker/compose
    labels:
      traefik.enable: "true"
      traefik.http.routers.vscode.rule: Host(`${VSCODE_HOST}`)
      traefik.http.routers.vscode.entrypoints: https
      traefik.http.routers.vscode.tls: "true"
      traefik.http.routers.vscode.middlewares: chain-authentik@file
      traefik.http.routers.vscode.service: vscode
      traefik.http.services.vscode.loadbalancer.server.port: 8443

networks:
  t2_proxy:
    name: t2_proxy
    external: true
